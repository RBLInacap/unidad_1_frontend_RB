<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <main class="container py-5">
        <section class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <div class="text-center mb-4">
                        <img src="logoSportClub.png" alt="Logo" height="60" class="mb-3">
                        <h2 class="text-corporate fw-bold">Registro de Socio</h2>
                        <p class="text-muted">Únete a nuestra comunidad deportiva</p>
                    </div>
                    <form action="login.html">
                        <div class="mb-3">
                            <label class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" placeholder="Tu nombre" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Correo Institucional (@inacapmail.cl)</label>
                            <input type="email" class="form-control" placeholder="ejemplo@inacapmail.cl" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Deporte de Interés (Opcional)</label>
                            <input type="text" class="form-control" placeholder="Ej: CrossFit, Yoga, Spinning">
                        </div>
                        <button type="submit" class="btn btn-corporate w-100 mb-3">Registrar Cuenta</button>
                    </form>
                    <div class="text-center">
                        <span class="text-muted">¿Ya tienes cuenta? <a href="login.html" class="text-corporate fw-bold">Inicia Sesión</a></span>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
