<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Usuario - SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark navbar-user">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="#">
                    <img src="logoSportClub.png" alt="Logo" height="35">
                    <span>| Usuario</span>
                </a>
                <div class="ms-auto d-flex gap-2">
                    <button class="btn btn-light btn-sm">Editar</button>
                    <a href="index.html" class="btn btn-outline-light btn-sm">Salir</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-4">
        <section class="row g-4">
            <div class="col-lg-4">
                <div class="card p-3 text-center">
                    <h5 class="border-bottom pb-2">Mi Perfil</h5>
                    <div class="py-3">
                        <p class="fw-bold mb-0">Estudiante Inacap</p>
                        <p class="text-muted small">usuario@inacapmail.cl</p>
                        <span class="badge bg-primary">Socio Activo</span>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card p-3">
                    <h5 class="border-bottom pb-2">Próximas Reservas</h5>
                    <p class="mt-2">Clase de Funcional - Lunes 18:00 hrs</p>
                </div>
            </div>
        </section>
    </main>

    <footer><p>&copy; 2026 SportClub. Portal de Usuario.</p></footer>
</body>
</html>
