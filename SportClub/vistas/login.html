<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <main class="container">
        <section class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 shadow-lg border-0">
                    <div class="text-center mb-4">
                        <img src="../assets/logoSportClub.png" alt="Logo" height="60" class="mb-3">
                        <h2 class="text-corporate fw-bold">Acceso Socios</h2>
                    </div>
                    
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Correo Institucional</label>
                            <input type="email" id="email" class="form-control" placeholder="nombre@inacapmail.cl">
                            <div id="emailError" class="text-danger small mt-1"></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Contraseña</label>
                            <input type="password" id="password" class="form-control">
                            <div id="passwordError" class="text-danger small mt-1"></div>
                        </div>
                        <div id="loginMessage" class="alert alert-danger d-none mb-3 small"></div>
                        <button type="submit" class="btn btn-corporate w-100 py-2">INGRESAR</button>
                    </form>

                    <div class="text-center small border-top pt-3 mt-3">
                        <a href="registro.html" class="text-corporate fw-bold">Crear cuenta nueva</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="../js/auth.js"></script>
</body>
</html>
