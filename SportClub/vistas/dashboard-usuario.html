<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark navbar-user">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="#">
                    <img src="assets/logoSportClub.png" alt="Logo" height="35">
                    <span>| Usuario</span>
                </a>
                <div class="ms-auto d-flex gap-2">
                    <a href="index.html" class="btn btn-outline-light btn-sm">Salir</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-4">
        <section class="row g-4">
            <div class="col-lg-4">
                <div class="card p-3 text-center border-0 shadow-sm">
                    <h5 class="border-bottom pb-2">Mi Perfil</h5>
                    <div class="py-3">
                        <p class="fw-bold mb-0" id="profileName">Cargando...</p>
                        <p class="text-muted small" id="profileEmail">correo@inacapmail.cl</p>
                        <span class="badge bg-primary">Socio Activo</span>
                    </div>
                    <button class="btn btn-corporate btn-sm w-100">Actualizar Datos</button>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card p-4 border-0 shadow-sm">
                    <h5 class="border-bottom pb-2">Panel de Control</h5>
                    <p class="mt-2">Bienvenido a tu plataforma deportiva. Aquí podrás ver tus próximas reservas y rutinas.</p>
                </div>
            </div>
        </section>
    </main>
    <script src="js/profile.js"></script>
</body>
</html>
