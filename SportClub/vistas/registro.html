<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <main class="container py-5">
        <section class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow-sm">
                    <div class="text-center mb-4">
                        <img src="assets/logoSportClub.png" alt="Logo" height="60" class="mb-3">
                        <h2 class="text-corporate fw-bold">Registro de Socio</h2>
                    </div>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label">Nombre Completo</label>
                            <input type="text" id="regName" class="form-control" placeholder="Tu nombre">
                            <div id="nameError" class="text-danger small mt-1"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Correo Institucional</label>
                            <input type="email" id="regEmail" class="form-control" placeholder="ejemplo@inacapmail.cl">
                            <div id="regEmailError" class="text-danger small mt-1"></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Contraseña (mín. 8 caracteres)</label>
                            <input type="password" id="regPassword" class="form-control">
                            <div id="regPassError" class="text-danger small mt-1"></div>
                        </div>

                        <div id="registerMessage" class="alert d-none mb-3 small"></div>

                        <button type="submit" class="btn btn-corporate w-100 mb-3">Registrar Cuenta</button>
                    </form>
                    <div class="text-center">
                        <span class="text-muted">¿Ya tienes cuenta? <a href="login.html" class="text-corporate fw-bold">Inicia Sesión</a></span>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="js/auth.js"></script>
</body>
</html>
