<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <main class="container">
        <section class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 text-center">
                    <img src="logoSportClub.png" alt="Logo SportClub" height="60" class="mb-3 mx-auto d-block">
                    
                    <header class="mb-4">
                        <h2 class="text-corporate fw-bold">Recuperar Acceso</h2>
                        <p class="text-muted small">Te enviaremos un enlace para restablecer tu contraseña.</p>
                    </header>

                    <form action="login.html">
                        <div class="mb-4 text-start">
                            <label class="form-label fw-bold">Correo Institucional (@inacapmail.cl)</label>
                            <input type="email" class="form-control" placeholder="usuario@inacapmail.cl" required>
                        </div>
                        
                        <button type="submit" class="btn btn-corporate w-100 mb-3" 
                                onclick="alert('Confirmación: Se ha enviado un enlace de recuperación a tu correo institucional.')">
                            Enviar Enlace
                        </button>
                    </form>

                    <nav class="text-center mt-2">
                        <a href="login.html" class="text-corporate text-decoration-none small">Volver al Inicio de Sesión</a>
                    </nav>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p class="mb-0">&copy; 2026 SportClub. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
